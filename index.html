<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zentist Logos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=TikTok+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div
      id="zentist-logos"
      class="zentist-logos zentist-logos--full"
    >
      <header class="zentist-logos__header">
        <div class="zentist-logos__controls">
          <div class="zentist-toggle-group" role="group" aria-label="Параметры отображения">
            <button
              type="button"
              class="zentist-toggle"
              data-toggle="view"
              aria-pressed="true"
            >
              Full Logo
            </button>
            <button
              type="button"
              class="zentist-toggle"
              data-toggle="dark"
              aria-pressed="false"
            >
              Dark Mode
            </button>
            <button
              type="button"
              class="zentist-toggle"
              data-toggle="mono"
              aria-pressed="false"
            >
              Monochrome
            </button>
          </div>
        </div>

        <span class="zentist-logos__version" data-version></span>
      </header>

      <div class="zentist-logos__grid" id="logos-grid"></div>
    </div>

    <script src="logo-builder.js"></script>
    <script src="script.js"></script>
  </body>
</html>
